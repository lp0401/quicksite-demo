<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickSite 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a5f' },
            slate: { 850: '#1e293b', 950: '#0f172a' }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-slate-50 text-slate-800">

  <!-- 侧边栏 -->
  <aside class="fixed left-0 top-0 h-full w-64 bg-slate-900 text-white z-40 hidden md:block">
    <div class="p-6 border-b border-slate-800">
      <a href="index.html" class="text-xl font-bold text-white flex items-center gap-2">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        QuickSite
      </a>
      <div class="text-xs text-slate-400 mt-1">管理后台</div>
    </div>
    <nav class="p-4 space-y-1">
      <a href="#dashboard" onclick="showTab('dashboard')" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium bg-primary-600 text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/></svg>
        数据看板
      </a>
      <a href="#leads" onclick="showTab('leads')" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
        线索管理
      </a>
      <a href="#settings" onclick="showTab('settings')" class="nav-item flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.212 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        系统设置
      </a>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-slate-800">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-primary-600 flex items-center justify-center text-white text-sm font-bold">管</div>
        <div>
          <div class="text-sm font-medium">管理员</div>
          <div class="text-xs text-slate-400">admin@quicksite.com</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- 主内容 -->
  <main class="md:ml-64 min-h-screen">
    <!-- 顶部栏 -->
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-30">
      <h1 id="pageTitle" class="text-lg font-semibold text-slate-900">数据看板</h1>
      <div class="flex items-center gap-4">
        <a href="index.html" target="_blank" class="text-sm text-slate-500 hover:text-primary-600 transition">查看前台</a>
        <button onclick="seedData()" class="text-sm text-slate-500 hover:text-primary-600 transition">生成示例数据</button>
      </div>
    </header>

    <div class="p-6 max-w-7xl mx-auto">
      <!-- 数据看板 -->
      <div id="tab-dashboard" class="tab-content">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
          <div class="bg-white rounded-xl border border-slate-200 p-6">
            <div class="text-sm text-slate-500 mb-1">总线索数</div>
            <div id="statTotal" class="text-3xl font-bold text-slate-900">0</div>
            <div class="text-xs text-emerald-600 mt-1">↑ 较上月 +12%</div>
          </div>
          <div class="bg-white rounded-xl border border-slate-200 p-6">
            <div class="text-sm text-slate-500 mb-1">待跟进</div>
            <div id="statNew" class="text-3xl font-bold text-slate-900">0</div>
            <div class="text-xs text-orange-600 mt-1">需及时处理</div>
          </div>
          <div class="bg-white rounded-xl border border-slate-200 p-6">
            <div class="text-sm text-slate-500 mb-1">已转化</div>
            <div id="statConverted" class="text-3xl font-bold text-slate-900">0</div>
            <div class="text-xs text-emerald-600 mt-1">↑ 转化率 8.5%</div>
          </div>
          <div class="bg-white rounded-xl border border-slate-200 p-6">
            <div class="text-sm text-slate-500 mb-1">今日新增</div>
            <div id="statToday" class="text-3xl font-bold text-slate-900">0</div>
            <div class="text-xs text-slate-400 mt-1">实时更新</div>
          </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
          <div class="bg-white rounded-xl border border-slate-200 p-6">
            <h3 class="text-sm font-semibold text-slate-900 mb-4">线索来源分布</h3>
            <div id="sourceChart" class="space-y-3">
              <div class="flex items-center gap-3">
                <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                  <div class="h-full bg-primary-500 rounded-full" style="width: 60%"></div>
                </div>
                <span class="text-sm text-slate-500 w-20 text-right">官网表单 60%</span>
              </div>
              <div class="flex items-center gap-3">
                <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                  <div class="h-full bg-emerald-500 rounded-full" style="width: 25%"></div>
                </div>
                <span class="text-sm text-slate-500 w-20 text-right">电话咨询 25%</span>
              </div>
              <div class="flex items-center gap-3">
                <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                  <div class="h-full bg-violet-500 rounded-full" style="width: 15%"></div>
                </div>
                <span class="text-sm text-slate-500 w-20 text-right">社交媒体 15%</span>
              </div>
            </div>
          </div>
          <div class="bg-white rounded-xl border border-slate-200 p-6">
            <h3 class="text-sm font-semibold text-slate-900 mb-4">最近线索</h3>
            <div id="recentLeads" class="space-y-3">
              <div class="text-sm text-slate-400 text-center py-4">暂无数据</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 线索管理 -->
      <div id="tab-leads" class="tab-content hidden">
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div class="p-4 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center gap-4 justify-between">
            <div class="flex items-center gap-2">
              <input type="text" id="searchInput" placeholder="搜索姓名或手机号..." class="px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-primary-500 w-64" oninput="renderLeads()">
              <select id="statusFilter" class="px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-primary-500" onchange="renderLeads()">
                <option value="">全部状态</option>
                <option value="new">待跟进</option>
                <option value="contacted">已联系</option>
                <option value="qualified">意向明确</option>
                <option value="converted">已转化</option>
                <option value="lost">已流失</option>
              </select>
            </div>
            <button onclick="exportLeads()" class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50 transition flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
              导出 CSV
            </button>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-500">
                <tr>
                  <th class="px-4 py-3 text-left font-medium">姓名</th>
                  <th class="px-4 py-3 text-left font-medium">手机号</th>
                  <th class="px-4 py-3 text-left font-medium">邮箱</th>
                  <th class="px-4 py-3 text-left font-medium">来源</th>
                  <th class="px-4 py-3 text-left font-medium">状态</th>
                  <th class="px-4 py-3 text-left font-medium">提交时间</th>
                  <th class="px-4 py-3 text-left font-medium">操作</th>
                </tr>
              </thead>
              <tbody id="leadsTable" class="divide-y divide-slate-100">
                <tr><td colspan="7" class="px-4 py-8 text-center text-slate-400">暂无线索数据</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 系统设置 -->
      <div id="tab-settings" class="tab-content hidden">
        <div class="max-w-2xl">
          <div class="bg-white rounded-xl border border-slate-200 p-6 mb-6">
            <h3 class="text-lg font-semibold text-slate-900 mb-4">站点信息</h3>
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">站点名称</label>
                <input type="text" value="QuickSite 演示站" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-primary-500">
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">站点描述</label>
                <textarea rows="2" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-primary-500 resize-none">5分钟搭建专业企业官网</textarea>
              </div>
            </div>
          </div>
          <div class="bg-white rounded-xl border border-slate-200 p-6 mb-6">
            <h3 class="text-lg font-semibold text-slate-900 mb-4">联系信息</h3>
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">客服邮箱</label>
                <input type="email" value="hello@quicksite.com" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-primary-500">
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">客服电话</label>
                <input type="tel" value="400-888-9999" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-primary-500">
              </div>
            </div>
          </div>
          <div class="bg-white rounded-xl border border-slate-200 p-6">
            <h3 class="text-lg font-semibold text-slate-900 mb-4">数据管理</h3>
            <button onclick="clearAllData()" class="px-4 py-2 bg-red-50 text-red-600 border border-red-200 rounded-lg text-sm font-medium hover:bg-red-100 transition">
              清空所有线索数据
            </button>
            <p class="text-xs text-slate-400 mt-2">此操作不可恢复，请谨慎操作。</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // 状态标签
    const statusLabels = {
      new: { text: '待跟进', class: 'bg-orange-50 text-orange-700 border-orange-200' },
      contacted: { text: '已联系', class: 'bg-blue-50 text-blue-700 border-blue-200' },
      qualified: { text: '意向明确', class: 'bg-violet-50 text-violet-700 border-violet-200' },
      converted: { text: '已转化', class: 'bg-emerald-50 text-emerald-700 border-emerald-200' },
      lost: { text: '已流失', class: 'bg-slate-100 text-slate-600 border-slate-200' }
    };

    // 切换标签
    function showTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById('tab-' + tab).classList.remove('hidden');
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.remove('bg-primary-600', 'text-white');
        el.classList.add('text-slate-300', 'hover:bg-slate-800', 'hover:text-white');
      });
      event.target.closest('.nav-item').classList.remove('text-slate-300', 'hover:bg-slate-800', 'hover:text-white');
      event.target.closest('.nav-item').classList.add('bg-primary-600', 'text-white');
      
      const titles = { dashboard: '数据看板', leads: '线索管理', settings: '系统设置' };
      document.getElementById('pageTitle').textContent = titles[tab];
      
      if (tab === 'dashboard') updateDashboard();
      if (tab === 'leads') renderLeads();
    }

    // 获取线索
    function getLeads() {
      return JSON.parse(localStorage.getItem('quicksite_leads') || '[]');
    }

    // 更新看板
    function updateDashboard() {
      const leads = getLeads();
      const today = new Date().toDateString();
      document.getElementById('statTotal').textContent = leads.length;
      document.getElementById('statNew').textContent = leads.filter(l => l.status === 'new').length;
      document.getElementById('statConverted').textContent = leads.filter(l => l.status === 'converted').length;
      document.getElementById('statToday').textContent = leads.filter(l => new Date(l.createdAt).toDateString() === today).length;
      
      const recent = leads.slice(0, 5);
      const recentEl = document.getElementById('recentLeads');
      if (recent.length === 0) {
        recentEl.innerHTML = '<div class="text-sm text-slate-400 text-center py-4">暂无数据</div>';
      } else {
        recentEl.innerHTML = recent.map(l => `
          <div class="flex items-center justify-between p-3 bg-slate-50 rounded-lg">
            <div>
              <div class="font-medium text-slate-900">${l.name}</div>
              <div class="text-xs text-slate-500">${l.phone}</div>
            </div>
            <span class="px-2 py-0.5 rounded text-xs font-medium border ${statusLabels[l.status]?.class || statusLabels.new.class}">
              ${statusLabels[l.status]?.text || '待跟进'}
            </span>
          </div>
        `).join('');
      }
    }

    // 渲染线索列表
    function renderLeads() {
      let leads = getLeads();
      const search = document.getElementById('searchInput').value.toLowerCase();
      const status = document.getElementById('statusFilter').value;
      
      if (search) {
        leads = leads.filter(l => l.name.toLowerCase().includes(search) || l.phone.includes(search));
      }
      if (status) {
        leads = leads.filter(l => l.status === status);
      }
      
      const tbody = document.getElementById('leadsTable');
      if (leads.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-8 text-center text-slate-400">暂无匹配数据</td></tr>';
        return;
      }
      
      tbody.innerHTML = leads.map(l => {
        const date = new Date(l.createdAt).toLocaleString('zh-CN');
        const statusInfo = statusLabels[l.status] || statusLabels.new;
        return `
          <tr class="hover:bg-slate-50 transition">
            <td class="px-4 py-3 font-medium text-slate-900">${l.name}</td>
            <td class="px-4 py-3 text-slate-600">${l.phone}</td>
            <td class="px-4 py-3 text-slate-600">${l.email || '-'}</td>
            <td class="px-4 py-3 text-slate-600">${l.source}</td>
            <td class="px-4 py-3">
              <select onchange="updateStatus(${l.id}, this.value)" class="px-2 py-1 rounded text-xs font-medium border ${statusInfo.class} bg-transparent cursor-pointer">
                <option value="new" ${l.status === 'new' ? 'selected' : ''}>待跟进</option>
                <option value="contacted" ${l.status === 'contacted' ? 'selected' : ''}>已联系</option>
                <option value="qualified" ${l.status === 'qualified' ? 'selected' : ''}>意向明确</option>
                <option value="converted" ${l.status === 'converted' ? 'selected' : ''}>已转化</option>
                <option value="lost" ${l.status === 'lost' ? 'selected' : ''}>已流失</option>
              </select>
            </td>
            <td class="px-4 py-3 text-slate-500 text-xs">${date}</td>
            <td class="px-4 py-3">
              <button onclick="deleteLead(${l.id})" class="text-red-500 hover:text-red-700 text-xs">删除</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    // 更新状态
    function updateStatus(id, status) {
      const leads = getLeads();
      const lead = leads.find(l => l.id === id);
      if (lead) {
        lead.status = status;
        localStorage.setItem('quicksite_leads', JSON.stringify(leads));
        renderLeads();
        updateDashboard();
      }
    }

    // 删除线索
    function deleteLead(id) {
      if (!confirm('确定删除这条线索？')) return;
      let leads = getLeads();
      leads = leads.filter(l => l.id !== id);
      localStorage.setItem('quicksite_leads', JSON.stringify(leads));
      renderLeads();
      updateDashboard();
    }

    // 导出 CSV
    function exportLeads() {
      const leads = getLeads();
      if (leads.length === 0) { alert('没有数据可导出'); return; }
      const csv = ['姓名,手机号,邮箱,来源,状态,提交时间'].concat(
        leads.map(l => `"${l.name}","${l.phone}","${l.email || ''}","${l.source}","${statusLabels[l.status]?.text || '待跟进'}","${l.createdAt}"`)
      ).join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'quicksite_leads_' + new Date().toISOString().slice(0, 10) + '.csv';
      link.click();
    }

    // 生成示例数据
    function seedData() {
      const sampleLeads = [
        { id: 1718880000001, name: '张三', phone: '13800138001', email: 'zhangsan@example.com', message: '想了解专业版功能', status: 'new', source: '官网表单', createdAt: new Date(Date.now() - 86400000 * 0).toISOString() },
        { id: 1718880000002, name: '李四', phone: '13900139002', email: 'lisi@example.com', message: '需要定制开发', status: 'contacted', source: '电话咨询', createdAt: new Date(Date.now() - 86400000 * 1).toISOString() },
        { id: 1718880000003, name: '王五', phone: '13700137003', email: '', message: '价格咨询', status: 'qualified', source: '官网表单', createdAt: new Date(Date.now() - 86400000 * 2).toISOString() },
        { id: 1718880000004, name: '赵六', phone: '13600136004', email: 'zhaoliu@example.com', message: '已决定购买', status: 'converted', source: '社交媒体', createdAt: new Date(Date.now() - 86400000 * 3).toISOString() },
        { id: 1718880000005, name: '孙七', phone: '13500135005', email: '', message: '暂时不需要', status: 'lost', source: '官网表单', createdAt: new Date(Date.now() - 86400000 * 5).toISOString() },
        { id: 1718880000006, name: '周八', phone: '13300133006', email: 'zhouba@example.com', message: '团队使用', status: 'new', source: '电话咨询', createdAt: new Date(Date.now() - 86400000 * 0.5).toISOString() },
      ];
      localStorage.setItem('quicksite_leads', JSON.stringify(sampleLeads));
      alert('示例数据已生成！');
      updateDashboard();
      renderLeads();
    }

    // 清空数据
    function clearAllData() {
      if (!confirm('确定清空所有线索数据？此操作不可恢复！')) return;
      localStorage.removeItem('quicksite_leads');
      alert('数据已清空');
      updateDashboard();
      renderLeads();
    }

    // 初始化
    updateDashboard();
  </script>
</body>
</html>
